id: server-info-disclosure
name: "Server Information Disclosure"
severity: low
cwe: CWE-200

request:
  method: GET
  path: /

matchers:
  - type: header_value
    header: "Server"
    pattern: "(Apache|nginx|IIS|LiteSpeed)/[\\d.]+"
    description: "Server header reveals software name and version"
  - type: header_value
    header: "X-Powered-By"
    pattern: ".+"
    description: "X-Powered-By header reveals backend technology"
  - type: header_value
    header: "X-AspNet-Version"
    pattern: ".+"
    description: "ASP.NET version disclosed in headers"
