id: cookie-security
name: "Insecure Cookie Configuration"
severity: medium
cwe: CWE-614

request:
  method: GET
  path: /

matchers:
  - type: header_value
    header: "Set-Cookie"
    pattern: "^(?!.*\\b[Ss]ecure\\b).*="
    description: "Cookie missing Secure flag — sent over unencrypted connections"
  - type: header_value
    header: "Set-Cookie"
    pattern: "^(?!.*\\b[Hh]ttp[Oo]nly\\b).*="
    description: "Cookie missing HttpOnly flag — accessible to JavaScript"
  - type: header_value
    header: "Set-Cookie"
    pattern: "^(?!.*\\b[Ss]ame[Ss]ite\\b).*="
    description: "Cookie missing SameSite attribute — vulnerable to CSRF"
