id: security-headers
name: "Missing Security Headers"
severity: medium
cwe: CWE-693

request:
  method: GET
  path: /

matchers:
  - type: header_absent
    headers:
      - "Strict-Transport-Security"
      - "X-Content-Type-Options"
      - "X-Frame-Options"
      - "Content-Security-Policy"
      - "Referrer-Policy"
      - "Permissions-Policy"
    description: "Missing security headers that protect against common web attacks"
