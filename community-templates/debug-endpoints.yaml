id: debug-endpoints
name: "Debug Endpoints Exposed"
severity: high
cwe: CWE-215

request:
  method: GET
  path: /

matchers:
  - type: body_regex
    pattern: "(?i)(django|laravel|symfony|spring)\\s*(debug|error|exception)"
    description: "Framework debug/error page detected"
  - type: body_regex
    pattern: "(?i)stack\\s*trace|traceback|exception\\s+in\\s+thread"
    description: "Stack trace or traceback visible in response"
  - type: body_regex
    pattern: "(?i)DEBUG\\s*=\\s*True|debug_mode.*enabled"
    description: "Debug mode appears to be enabled"
