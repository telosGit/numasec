id: exposed-admin-panels
name: "Exposed Admin Panels"
severity: high
cwe: CWE-425

request:
  method: GET
  path: /admin

matchers:
  - type: status_code
    code: 200
    description: "Admin panel path returned 200 OK"
  - type: body_regex
    pattern: "(?i)(admin|dashboard|control.panel|sign.in|log.?in|password)"
    description: "Page contains admin-related keywords"
