name: CI

on:
  push:
    branches:
      - dev
      - main
      - "release-*"
      - "hotfix-*"
  pull_request:
    branches:
      - dev
      - main
      - "release-*"
      - "hotfix-*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run typecheck
        working-directory: agent

  ts-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun test --timeout 30000
        working-directory: agent/packages/numasec

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run build
        working-directory: agent/packages/numasec

  release-proof:
    name: Release Proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run test:release-proof
        working-directory: agent/packages/numasec
