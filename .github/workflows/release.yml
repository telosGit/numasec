name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pip install -e ".[all]"
      - run: ruff check numasec/
      - run: pytest tests/ -v -m "not slow and not benchmark" --tb=short
      - run: bun install
        working-directory: agent
      - run: bun run typecheck
        working-directory: agent/packages/numasec

  publish-pypi:
    name: Publish to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  build-agent:
    name: Build Agent Binary
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: agent
      - run: bun run build -- --single
        working-directory: agent/packages/numasec
      - name: Collect and rename binaries
        shell: bash
        run: |
          mkdir -p agent/packages/numasec/release
          for dir in agent/packages/numasec/dist/*/; do
            name=$(basename "$dir")
            for f in "$dir/bin/numasec"*; do
              [ -f "$f" ] || continue
              ext="${f##*numasec}"
              cp "$f" "agent/packages/numasec/release/${name}${ext}"
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: numasec-${{ matrix.os }}
          path: agent/packages/numasec/release/

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: numasec-*
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  publish-docker:
    name: Publish Docker Image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: agent
      - run: bun run build -- --musl-only
        working-directory: agent/packages/numasec
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: agent/packages/numasec
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            francescosta/numasec:${{ github.ref_name }}
            francescosta/numasec:latest
            ghcr.io/francescostabile/numasec:${{ github.ref_name }}
            ghcr.io/francescostabile/numasec:latest
