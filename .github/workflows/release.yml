name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - id: meta
        env:
          GH_REPO: ${{ github.repository }}
          NUMASEC_BUMP: ${{ inputs.bump }}
          NUMASEC_VERSION: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: bun run script/version.ts
        working-directory: agent

  validate:
    name: Pre-release Validation
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run typecheck
        working-directory: agent
      - run: bun run build
        working-directory: agent/packages/numasec
      - run: bun test --timeout 30000
        working-directory: agent/packages/numasec
      - run: bun run test:release-proof
        working-directory: agent/packages/numasec

  startup-smoke:
    name: Platform Startup Smoke
    needs: [version, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run build --single
        working-directory: agent/packages/numasec
        env:
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest
      - run: bun run script/release-proof.ts --startup-only
        working-directory: agent/packages/numasec

  build-agent:
    name: Build Agent Binary
    needs: [version, validate, startup-smoke]
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_targets: "linux"
          - os: ubuntu-latest
            build_targets: "win32"
          - os: macos-latest
            build_targets: "darwin"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      # Build all targets for this OS (cross-compiles x64+arm64)
      - run: bun run build
        working-directory: agent/packages/numasec
        env:
          NUMASEC_BUILD_OS: ${{ matrix.build_targets }}
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest
      - name: Create release archives
        shell: bash
        run: |
          mkdir -p agent/packages/numasec/release
          for dir in agent/packages/numasec/dist/numasec-*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            case "$name" in
              *linux*)
                [ -f "$dir/bin/numasec" ] || continue
                tar -czf "agent/packages/numasec/release/${name}.tar.gz" -C "$dir/bin" numasec
                ;;
              *darwin*)
                [ -f "$dir/bin/numasec" ] || continue
                (cd "$dir/bin" && zip -r "../../../release/${name}.zip" numasec)
                ;;
              *windows*)
                [ -f "$dir/bin/numasec.exe" ] || continue
                (cd "$dir/bin" && zip -r "../../../release/${name}.zip" numasec.exe)
                ;;
            esac
          done
          ls -lh agent/packages/numasec/release/ 2>/dev/null || echo "No release archives created"
      - uses: actions/upload-artifact@v4
        with:
          name: numasec-${{ matrix.build_targets }}
          path: agent/packages/numasec/release/
      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ matrix.build_targets }}
          path: agent/packages/numasec/dist/

  github-release:
    name: Create GitHub Release
    needs: [version, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: numasec-*
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          draft: false
          files: artifacts/**/*

  publish-npm:
    name: Publish to npm
    needs: [version, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: npm-packages-*
          path: npm-artifacts/
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          spec() {
            node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(process.argv[1] + '/package.json', 'utf8')); console.log(pkg.name + '@' + pkg.version)" "$1"
          }

          publish_dir() {
            dir="$1"
            pkg=$(spec "$dir")
            if npm view "$pkg" version >/dev/null 2>&1; then
              echo "Skipping existing $pkg"
              return 0
            fi
            npm publish "$dir" --access public
          }

          # Merge platform packages from all build runners
          mkdir -p packages
          for src in npm-artifacts/npm-packages-*/numasec-*/; do
            [ -d "$src" ] || continue
            name=$(basename "$src")
            if [ -d "packages/$name" ]; then
              echo "Skipping duplicate: $name"
              continue
            fi
            cp -r "$src" "packages/$name"
          done

          # Also grab the main numasec package (generated by any runner)
          for src in npm-artifacts/npm-packages-*/numasec/; do
            [ -d "$src" ] || continue
            cp -r "$src" "packages/numasec"
            break
          done

          # Fix: rebuild optionalDependencies to include ALL platform packages
          if [ -d "packages/numasec" ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const pkg = JSON.parse(fs.readFileSync('packages/numasec/package.json', 'utf8'));
              const deps = {};
              for (const dir of fs.readdirSync('packages')) {
                if (dir.startsWith('numasec-')) {
                  const sub = JSON.parse(fs.readFileSync(path.join('packages', dir, 'package.json'), 'utf8'));
                  deps[sub.name] = sub.version;
                }
              }
              pkg.optionalDependencies = deps;
              fs.writeFileSync('packages/numasec/package.json', JSON.stringify(pkg, null, 2));
              console.log('optionalDependencies:', deps);
            "
          fi

          if [ ! -d "packages/numasec" ]; then
            echo "Missing main numasec package artifact"
            exit 1
          fi

          # Restore executable permissions (GitHub Actions artifacts strip them)
          for dir in packages/numasec-*/; do
            [ -d "$dir" ] || continue
            chmod +x "$dir/bin/numasec" 2>/dev/null || true
          done

          # Publish platform binary packages first
          for dir in packages/numasec-*/; do
            [ -d "$dir" ] || continue
            publish_dir "$dir"
          done

          # Publish main package last (use tarball to avoid path/name confusion)
          pkg=$(spec "packages/numasec")
          if npm view "$pkg" version >/dev/null 2>&1; then
            echo "Skipping existing $pkg"
          else
            cd packages/numasec
            npm pack
            tarball=$(ls -1 *.tgz | head -n 1)
            npm publish "$tarball" --access public
          fi

  publish-docker:
    name: Publish Docker Image
    needs: [version, validate]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run build
        working-directory: agent/packages/numasec
        env:
          NUMASEC_BUILD_OS: linux
          NUMASEC_VERSION: ${{ needs.version.outputs.version }}
          NUMASEC_CHANNEL: latest
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/packages/numasec/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/numasec:${{ needs.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/numasec:latest
            ghcr.io/${{ github.repository_owner }}/numasec:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/numasec:latest
