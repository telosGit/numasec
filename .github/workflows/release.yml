name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: pip install -e ".[all]"
      - run: ruff check numasec/
      - run: pytest tests/ -v -m "not slow and not benchmark" --tb=short
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run typecheck
        working-directory: agent/packages/numasec

  publish-pypi:
    name: Publish to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  build-agent:
    name: Build Agent Binary
    needs: validate
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_targets: "linux"
          - os: macos-latest
            build_targets: "darwin"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      # Build all targets for this OS (cross-compiles x64+arm64)
      - run: bun run build
        working-directory: agent/packages/numasec
        env:
          NUMASEC_BUILD_OS: ${{ matrix.build_targets }}
      - name: Create release archives
        shell: bash
        run: |
          mkdir -p agent/packages/numasec/release
          for dir in agent/packages/numasec/dist/numasec-*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            binary="$dir/bin/numasec"
            [ -f "$binary" ] || continue

            case "$name" in
              *linux*|*darwin*)
                tar -czf "agent/packages/numasec/release/${name}.tar.gz" -C "$dir/bin" numasec
                ;;
              *windows*)
                (cd "$dir/bin" && zip -r "../../../release/${name}.zip" numasec.exe)
                ;;
            esac
          done
          ls -lh agent/packages/numasec/release/
      - uses: actions/upload-artifact@v4
        with:
          name: numasec-${{ matrix.os }}
          path: agent/packages/numasec/release/

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: numasec-*
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  publish-docker:
    name: Publish Docker Image
    needs: validate
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
        working-directory: agent
      - run: bun run build
        working-directory: agent/packages/numasec
        env:
          NUMASEC_BUILD_OS: linux
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/packages/numasec/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            francescosta/numasec:${{ github.ref_name }}
            francescosta/numasec:latest
            ghcr.io/francescostabile/numasec:${{ github.ref_name }}
            ghcr.io/francescostabile/numasec:latest
