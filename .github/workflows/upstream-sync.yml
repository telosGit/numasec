name: Upstream Sync Check

on:
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check opencode upstream for new commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream opencode
        run: |
          git remote add upstream https://github.com/sst/opencode.git || true
          git fetch upstream main --depth=50

      - name: Compare and generate report
        id: report
        run: |
          BASE=$(git log --oneline upstream/main -1 --format="%H")
          MERGE_BASE=$(git merge-base HEAD upstream/main 2>/dev/null || echo "unknown")

          NEW_COMMITS=$(git log --oneline ${MERGE_BASE}..upstream/main 2>/dev/null | head -30 || echo "Unable to compute diff")
          COUNT=$(git log --oneline ${MERGE_BASE}..upstream/main 2>/dev/null | wc -l | tr -d ' ' || echo "?")

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT

          # Zone classification of changed files
          ALL_FILES=$(git diff --name-only ${MERGE_BASE}..upstream/main 2>/dev/null || echo "")

          SAFE_FILES=""
          REVIEW_FILES=""
          DIVERGED_FILES=""
          OTHER_FILES=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              packages/numasec/src/provider/*|packages/numasec/src/auth/*|packages/numasec/src/effect/*|packages/numasec/src/id/*|packages/numasec/src/format/*|packages/numasec/src/bus/*|packages/numasec/src/env/*|packages/ui/*|packages/plugin/*)
                SAFE_FILES="${SAFE_FILES}${file}\n"
                ;;
              packages/numasec/src/tool/*|packages/numasec/src/agent/*|packages/numasec/src/session/prompt/*|packages/numasec/src/command/*|packages/numasec/src/bridge/*|packages/numasec/src/lsp/*|packages/numasec/src/ide/*|packages/numasec/src/worktree/*)
                DIVERGED_FILES="${DIVERGED_FILES}${file}\n"
                ;;
              packages/numasec/src/session/*|packages/numasec/src/config/*|packages/numasec/src/storage/*|packages/numasec/src/mcp/*|packages/numasec/src/server/*|packages/numasec/src/permission/*|packages/numasec/src/skill/*)
                REVIEW_FILES="${REVIEW_FILES}${file}\n"
                ;;
              *)
                OTHER_FILES="${OTHER_FILES}${file}\n"
                ;;
            esac
          done <<< "$ALL_FILES"

          SAFE_COUNT=$(echo -e "$SAFE_FILES" | grep -c . 2>/dev/null || echo "0")
          REVIEW_COUNT=$(echo -e "$REVIEW_FILES" | grep -c . 2>/dev/null || echo "0")
          DIVERGED_COUNT=$(echo -e "$DIVERGED_FILES" | grep -c . 2>/dev/null || echo "0")
          OTHER_COUNT=$(echo -e "$OTHER_FILES" | grep -c . 2>/dev/null || echo "0")

          # Write report to file
          {
            echo "## Upstream opencode — $COUNT new commits since fork"
            echo ""
            echo "**Merge base:** \`$MERGE_BASE\`"
            echo "**Upstream HEAD:** \`$BASE\`"
            echo ""
            echo "### Zone Classification"
            echo ""
            echo "| Zone | Files | Action |"
            echo "|------|-------|--------|"
            echo "| 🟢 Safe | $SAFE_COUNT | Run \`script/upstream-merge-safe.sh --apply\` |"
            echo "| 🟡 Review | $REVIEW_COUNT | Manual cherry-pick with \`git cherry-pick -x\` |"
            echo "| 🔴 Diverged | $DIVERGED_COUNT | Read for insights, do not merge |"
            echo "| ⚪ Other | $OTHER_COUNT | Evaluate per-file |"
            echo ""
            echo "### Commits"
            echo '```'
            echo "$NEW_COMMITS"
            echo '```'
            echo ""
            if [ "$SAFE_COUNT" -gt 0 ]; then
              echo "### 🟢 Safe Zone (auto-mergeable)"
              echo '```'
              echo -e "$SAFE_FILES" | head -20
              echo '```'
              echo ""
            fi
            if [ "$REVIEW_COUNT" -gt 0 ]; then
              echo "### 🟡 Review Zone (manual cherry-pick)"
              echo '```'
              echo -e "$REVIEW_FILES" | head -20
              echo '```'
              echo ""
            fi
            if [ "$DIVERGED_COUNT" -gt 0 ]; then
              echo "### 🔴 Diverged Zone (skip)"
              echo '```'
              echo -e "$DIVERGED_FILES" | head -20
              echo '```'
              echo ""
            fi
            echo "### Next Steps"
            echo "1. Run \`./script/upstream-merge-safe.sh\` for a dry-run of Safe Zone cherry-picks"
            echo "2. Manually review Review Zone changes with \`git cherry-pick -x <commit>\`"
            echo "3. Log all decisions in \`UPSTREAM_LOG.md\`"
            echo "4. Tag: \`git tag upstream-sync-$(date +%Y-%m-%d)\`"
          } > /tmp/upstream_report.md

          cat /tmp/upstream_report.md

      - name: Create issue if new commits found
        if: steps.report.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/upstream_report.md', 'utf8')
            const count = '${{ steps.report.outputs.count }}'

            // Check if open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open'
            })

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
                title: `upstream: ${count} new commits from opencode`
              })
              console.log(`Updated existing issue #${issues.data[0].number}`)
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `upstream: ${count} new commits from opencode`,
                body: body,
                labels: ['upstream-sync']
              })
              console.log('Created new upstream sync issue')
            }
