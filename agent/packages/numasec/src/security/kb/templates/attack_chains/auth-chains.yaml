id: auth-chains
category: attack_chains
name: Authentication & Authorization Attack Chains

chains:
  jwt_forge_to_admin:
    name: "Weak JWT -> Token Forgery -> Admin Takeover"
    description: "Exploit weak JWT signing to forge admin tokens"
    severity: critical
    prerequisites:
      - "JWT with weak HS256 secret or alg:none accepted"
    steps:
      - step: 1
        action: "Decode JWT and identify claims"
        technique: "Base64-decode header and payload"
        tool: "http_request"
      - step: 2
        action: "Crack HS256 secret or switch to alg:none"
        techniques:
          alg_none: "Set header.alg='none', remove signature"
          weak_secret: "Brute-force common secrets: secret, password, key, jwt_secret"
          kid_traversal: "Set kid='../../../dev/null' to use empty key"
        tool: "auth_test"
      - step: 3
        action: "Forge admin token"
        technique: "Set role=admin/isAdmin=true in payload, re-sign"
        tool: "http_request"
      - step: 4
        action: "Access admin endpoints with forged token"
        tool: "access_control_test"
      - step: 5
        action: "Enumerate admin-only functionality"
        tool: "crawl"
    impact: "Full admin access, user management, configuration changes"
    cwe_chain: ["CWE-347", "CWE-287", "CWE-269"]

  default_creds_to_full_access:
    name: "Default Credentials -> Admin Access -> Data Exfiltration"
    description: "Use default credentials to gain admin access and extract sensitive data"
    severity: critical
    prerequisites:
      - "Login endpoint discovered"
    steps:
      - step: 1
        action: "Test default credentials"
        technique: "Use kb_search(query='default credentials') for credential lists"
        tool: "kb_search"
      - step: 2
        action: "Login and capture session token"
        tool: "http_request"
      - step: 3
        action: "Store credentials for post-auth testing"
        tool: "record_evidence"
      - step: 4
        action: "Execute full post-auth assessment"
        technique: "Use plan_next with auth-obtained signals and the captured token/session context"
        tool: "plan_next"
    impact: "Unauthorized admin access, data breach"
    cwe_chain: ["CWE-798", "CWE-284", "CWE-200"]

  idor_to_mass_data:
    name: "IDOR -> User Enumeration -> Mass Data Extraction"
    description: "Exploit IDOR to enumerate and extract all users' data"
    severity: high
    prerequisites:
      - "Confirmed IDOR on user-specific endpoint"
      - "Valid auth token"
    steps:
      - step: 1
        action: "Confirm IDOR with adjacent IDs"
        technique: "Access /api/users/1, /api/users/2, etc."
        tool: "access_control_test"
      - step: 2
        action: "Enumerate ID range"
        technique: "Binary search or sequential scan for valid IDs"
        tool: "http_request"
      - step: 3
        action: "Test other resource types with same pattern"
        targets:
          - "Baskets/carts, orders, invoices"
          - "Payment cards, wallets"
          - "Private messages, notifications"
          - "Documents, uploads"
        tool: "access_control_test"
      - step: 4
        action: "Report each affected resource type as separate finding"
        tool: "save_finding"
    impact: "Mass data exposure across all user accounts"
    cwe_chain: ["CWE-639", "CWE-200", "CWE-284"]

  password_change_bypass:
    name: "Broken Auth -> Password Change Without Verification -> Account Takeover"
    description: "Change any user's password without knowing the current one"
    severity: critical
    prerequisites:
      - "Password change endpoint discovered"
      - "Valid auth token"
    steps:
      - step: 1
        action: "Test password change without current_password field"
        technique: "POST/PUT to password change endpoint omitting current password"
        tool: "http_request"
      - step: 2
        action: "Test password change via GET method"
        technique: "GET /change-password?new=hacked&repeat=hacked"
        tool: "http_request"
      - step: 3
        action: "Test CSRF on password change"
        technique: "Submit from different origin without anti-CSRF token"
        tool: "access_control_test"
    impact: "Account takeover for any user"
    cwe_chain: ["CWE-620", "CWE-287", "CWE-352"]
